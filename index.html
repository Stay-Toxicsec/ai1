<html>

<body>

  <header>✨ Free AI Image Generator</header>


  <input id="prompt" placeholder="Describe the image you want...">
  <button onclick=sendMessage()>Generate</button>


  <script>
    async function sendMessage() {
      const input = document.getElementById("prompt");
      const head = input.value;

      if (!head.trim()) {
        alert("Enter a prompt");
        return;
      }

      const res = await fetch("https://soft-bird-db86.staytoxicsec.workers.dev/", {
        method: "POST",
        headers: {
          "Authorization": "Bearer Instagram@__devesh__m",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ prompt: head }),
      });

      const contentType = res.headers.get("content-type");

      if (contentType.includes("application/json")) {
        const data = await res.json();
        alert("Error: " + data.error);
        return;
      }

      const blob = await res.blob();

      document.querySelectorAll("img").forEach(e => e.remove());

      const img = document.createElement("img");
      img.src = URL.createObjectURL(blob);
      img.style.height = "500px";

      document.body.appendChild(img);
    }
  </script>

</body>

</html>
