<html>

<body>

  <header>✨ Free AI Image Generator</header>


  <input id="prompt" placeholder="Describe the image you want...">
  <button onclick=sendMessage()>Generate</button>


  <script>
    async function sendMessage() {
      const input = document.getElementById("prompt");
      const head = input.value;

      if (!head.trim()) {
        alert("Enter a prompt");
        return;
      }

      const res = await fetch("https://soft-bird-db86.staytoxicsec.workers.dev/", {
        method: "POST",
        headers: {
          "Authorization": "Bearer Instagram@__devesh__m",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ prompt: head }),
      });

      const contentType = res.headers.get("content-type");

      if (contentType.includes("application/json")) {
        const data = await res.json();
        alert("Error: " + data.error);
        return;
      }

      const blob = await res.blob();

      const base64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });

      const img = document.createElement("img");
      img.src = base64;
      img.style.height = "500px";

      document.body.innerHTML = "";
      document.body.appendChild(img);

      
      window.generatedImage = base64;

      console.log("BASE64:", base64.slice(0, 100));
    }
  </script>

</body>

</html>
